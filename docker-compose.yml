services:

  mysql:
    image: mysql:5.7
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-safely123}
      MYSQL_DATABASE: anbao
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./db/init.sql:/docker-entrypoint-initdb.d/01_init.sql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci

  redis:
    image: redis:7
    command: redis-server --requirepass ${REDIS_PASSWORD:-safely123}
    ports:
      - "6379:6379"

  rabbitmq:
    image: rabbitmq:3-management
    environment:
      RABBITMQ_DEFAULT_USER: ${MQ_USER:-anbao_mq}
      RABBITMQ_DEFAULT_PASS: ${MQ_PASSWORD:-safely123}
    ports:
      - "5672:5672"
      - "15672:15672"

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  server:
    build:
      context: .
      dockerfile: cloud/Dockerfile
    ports:
      - "8000:8000"
    depends_on:
      - mysql
      - redis
      - rabbitmq
      - minio
    environment:
      DB_HOST: mysql
      DB_PORT: "3306"
      DB_USER: root
      DB_PASSWORD: ${DB_PASSWORD:-safely123}
      DB_NAME: anbao
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ${REDIS_PASSWORD:-safely123}
      MQ_HOST: rabbitmq
      MQ_PORT: "5672"
      MQ_USER: ${MQ_USER:-anbao_mq}
      MQ_PASSWORD: ${MQ_PASSWORD:-safely123}
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-minioadmin}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-minioadmin}
      S3_BUCKET: safely-videos
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      DEVICE_API_KEY: ${DEVICE_API_KEY:-dev-unsafe-default-key}
      MQ_SIGNING_SECRET: ${MQ_SIGNING_SECRET:-dev-unsafe-default-key}

volumes:
  mysql_data:
  minio_data:
